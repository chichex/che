version: 2

builds:
  - main: .
    binary: che-beta
    ldflags:
      - -s -w -X github.com/chichex/che/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

homebrew_casks:
  - name: che-beta
    repository:
      owner: chichex
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/chichex/che
    description: "che-beta - versión pre-release de che para testing"
    license: MIT
    binaries:
      - che-beta
    hooks:
      post:
        install: |
          system "xattr", "-dr", "com.apple.quarantine", "#{staged_path}/che-beta"
          system "codesign", "--sign", "-", "--force", "#{staged_path}/che-beta"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
