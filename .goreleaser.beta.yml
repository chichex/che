version: 2

builds:
  - main: .
    binary: che
    ldflags:
      - -s -w -X github.com/chichex/che/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

homebrew_casks:
  - name: che-beta
    repository:
      owner: chichex
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/chichex/che
    description: "che-beta - versión pre-release de che para testing"
    license: MIT
    binaries:
      - che
    hooks:
      pre:
        install: |
          system "/bin/bash", "-c", 'brew list --cask che 2>/dev/null && (echo "che-beta: desinstalando cask estable para evitar conflicto de binario..." && brew uninstall --cask che) || true'
      post:
        install: |
          system "xattr", "-dr", "com.apple.quarantine", "#{staged_path}/che"
          system "codesign", "--sign", "-", "--force", "#{staged_path}/che"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
