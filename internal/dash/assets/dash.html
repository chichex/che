<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>che dash — prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f6;
    --panel: #ffffff;
    --ink: #111113;
    --ink-2: #4b4b52;
    --ink-3: #8b8b94;
    --line: rgba(17, 17, 19, 0.08);
    --line-2: rgba(17, 17, 19, 0.04);
    --hover: rgba(17, 17, 19, 0.035);
    --selected: rgba(17, 17, 19, 0.06);
    --accent: oklch(0.55 0.15 250);
    --running: oklch(0.6 0.14 245);
    --done: oklch(0.58 0.13 150);
    --failed: oklch(0.58 0.18 27);
    --warn: oklch(0.7 0.13 70);
    --muted: oklch(0.7 0.01 270);
  }
  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-feature-settings: 'cv02','cv03','cv04','cv11'; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .panel { background: var(--panel); border: 1px solid var(--line); }
  .hairline { border-color: var(--line); }
  .hairline-2 { border-color: var(--line-2); }
  .ink { color: var(--ink); }
  .ink-2 { color: var(--ink-2); }
  .ink-3 { color: var(--ink-3); }
  .bg-panel { background: var(--panel); }
  .bg-hover:hover { background: var(--hover); }
  .bg-selected { background: var(--selected); }

  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-running { background: var(--running); box-shadow: 0 0 0 0 rgba(80,120,220,0.5); animation: pulse 1.6s ease-out infinite; }
  .dot-done    { background: var(--done); }
  .dot-failed  { background: var(--failed); }
  .dot-draft   { background: transparent; border: 1.5px solid var(--ink-3); }
  .dot-pending { background: transparent; border: 1.5px solid var(--ink-3); }
  .dot-cancelled, .dot-interrupted { background: var(--muted); }
  .dot-paused { background: var(--warn); }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(80,120,220,0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(80,120,220,0); }
    100% { box-shadow: 0 0 0 0 rgba(80,120,220,0); }
  }

  .stream {
    background: #0e0e10;
    color: #d8d8db;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.55;
  }
  .stream .l-out { color: #c8c8cd; }
  .stream .l-err { color: #e69a8d; }
  .stream .l-sys { color: #8da4d6; }
  .stream .l-ts  { color: #5e5e66; }
  .caret::after {
    content: "▌";
    color: #8da4d6;
    animation: blink 1.1s steps(2) infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 11px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 6px;
    font-size: 12.5px; font-weight: 500;
    color: var(--ink);
    transition: background 80ms ease;
  }
  .btn:hover { background: var(--hover); }
  .btn-primary {
    background: var(--ink); color: white; border-color: var(--ink);
  }
  .btn-primary:hover { background: #000; }
  .btn-danger {
    background: var(--panel); color: var(--failed); border-color: color-mix(in oklch, var(--failed) 35%, var(--line));
  }
  .btn-danger:hover { background: color-mix(in oklch, var(--failed) 8%, white); }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--hover); }
  .kbd {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; padding: 1px 5px;
    border: 1px solid var(--line); border-radius: 4px;
    color: var(--ink-2); background: var(--panel);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 1px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--ink-2);
  }
  .badge-draft { color: var(--warn); border-color: color-mix(in oklch, var(--warn) 25%, var(--line)); }
  .badge-running { color: var(--running); border-color: color-mix(in oklch, var(--running) 25%, var(--line)); }
  .badge-done { color: var(--done); border-color: color-mix(in oklch, var(--done) 25%, var(--line)); }
  .badge-failed { color: var(--failed); border-color: color-mix(in oklch, var(--failed) 25%, var(--line)); }
  .badge-paused { color: var(--warn); border-color: color-mix(in oklch, var(--warn) 30%, var(--line)); }

  .scroll-thin::-webkit-scrollbar { width: 10px; height: 10px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 8px; border: 2px solid var(--bg); }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

  .step-row:hover { background: var(--hover); }
  .step-row.selected { background: var(--selected); }

  /* notes drawer */
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  /* Global SSE fade-in for new rail/run items */
  @keyframes dash-fade-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .dash-fade-in { animation: dash-fade-in 500ms ease-out; }

  /* Global connection badge states */
  .badge-live    { color: var(--done);    border-color: color-mix(in oklch, var(--done) 25%, var(--line)); }
  .badge-reconn  { color: var(--warn);    border-color: color-mix(in oklch, var(--warn) 25%, var(--line)); }
  .badge-disconn { color: var(--failed);  border-color: color-mix(in oklch, var(--failed) 25%, var(--line)); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body class="min-h-screen">

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────────────
// Mock data
// ─────────────────────────────────────────────────────────────────────

const NOW = Date.now();
const minsAgo = (m) => new Date(NOW - m * 60_000).toISOString();
const secsAgo = (s) => new Date(NOW - s * 1000).toISOString();

const PIPELINES_INIT = [];

const RUNS_INIT = {};

// initial stream lines for the currently running step
const INITIAL_STREAM = [
  { t: 74, kind: "sys", text: "starting run 7c2a91 of refactor-go (input: internal/runner)" },
  { t: 73, kind: "sys", text: "step 1/5 · plan" },
  { t: 73, kind: "out", text: "claude: drafting plan for internal/runner" },
  { t: 70, kind: "out", text: "plan written to .che/runs/7c2a91/plan.md (1.4 KB)" },
  { t: 70, kind: "sys", text: "step 2/5 · patch" },
  { t: 69, kind: "out", text: "claude: applying patch to internal/runner/run.go" },
  { t: 64, kind: "out", text: "claude: applying patch to internal/runner/stream.go" },
  { t: 58, kind: "out", text: "patch applied · 4 files changed · +127 −94" },
  { t: 58, kind: "sys", text: "step 3/5 · review (cross-review, max_loops: 3)" },
  { t: 57, kind: "out", text: "validator: loop 1 · reading diff" },
  { t: 50, kind: "out", text: "validator: loop 1 verdict = needs_changes" },
  { t: 50, kind: "out", text: "feedback: \"missing error wrap in run.go:142; consider context cancel propagation\"" },
  { t: 48, kind: "out", text: "claude: applying revision based on validator feedback" },
  { t: 38, kind: "out", text: "patch applied · 2 files changed · +18 −7" },
  { t: 38, kind: "out", text: "validator: loop 2 · reading diff" },
  { t: 30, kind: "out", text: "validator: loop 2 verdict = needs_changes" },
  { t: 30, kind: "out", text: "feedback: \"imports en orden incorrecto en internal/runner/run.go; reordenar antes de aceptar.\"" },
  { t: 28, kind: "out", text: "claude: applying revision based on validator feedback" },
  { t: 12, kind: "out", text: "applying patch to internal/runner/run.go" },
  { t: 6,  kind: "out", text: "reordering imports" },
];

// random stream continuations for the simulator
const STREAM_CONTINUATIONS = [
  { kind: "out", text: "goimports: 14 lines reordered" },
  { kind: "out", text: "patch applied · 1 file changed · +6 −6" },
  { kind: "out", text: "validator: loop 3 · reading diff" },
  { kind: "out", text: "validator: scanning internal/runner/run.go" },
  { kind: "out", text: "validator: scanning internal/runner/stream.go" },
  { kind: "out", text: "validator: loop 3 verdict = accepted" },
  { kind: "sys", text: "step 4/5 · test" },
  { kind: "out", text: "$ go test ./internal/runner/..." },
  { kind: "out", text: "ok  internal/runner  0.412s" },
  { kind: "out", text: "ok  internal/runner/stream  0.103s" },
  { kind: "sys", text: "step 5/5 · commit" },
  { kind: "out", text: "$ git add internal/runner" },
  { kind: "out", text: "$ git commit -m \"runner: error wrapping + import order\"" },
  { kind: "out", text: "[refactor-go 8a91c2] runner: error wrapping + import order" },
  { kind: "sys", text: "run finished · status=done · duration=2m 14s" },
];

// ─────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────

const fmtDuration = (ms) => {
  if (ms == null) return "—";
  if (ms < 1000) return ms + " ms";
  const s = ms / 1000;
  if (s < 60) return s.toFixed(s < 10 ? 1 : 0) + " s";
  const m = Math.floor(s / 60);
  const rs = Math.round(s - m * 60);
  return `${m}m ${rs.toString().padStart(2, "0")}s`;
};

const fmtAgo = (iso) => {
  if (!iso) return "—";
  const diff = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 60) return diff + "s ago";
  if (diff < 3600) return Math.round(diff / 60) + "m ago";
  if (diff < 86400) return Math.round(diff / 3600) + "h ago";
  return Math.round(diff / 86400) + "d ago";
};

const fmtClock = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toTimeString().slice(0, 8);
};

const StatusDot = ({ status }) => <span className={"dot dot-" + status} />;

const verdictBadgeClass = (v) => {
  if (v === "accepted" || v === "pass") return "badge-done";
  if (v === "needs_changes") return "badge-paused";
  if (v === "fail" || v === "rejected") return "badge-failed";
  return "badge-pending";
};

const ValidatorHistory = ({ validator, step, runStep }) => {
  const history = validator?.history || [];
  const [openIdx, setOpenIdx] = useState(history.length - 1);
  if (!validator) return null;
  return (
    <div className="flex-1 overflow-y-auto scroll-thin px-6 py-5">
      <div className="mb-4 flex items-center gap-3 text-[12px]">
        <span className="text-[10.5px] uppercase tracking-wider ink-3 font-semibold">cross-review</span>
        <span className="mono ink">loop {validator.loops_run}/{validator.max_loops}</span>
        <span className="ink-3">·</span>
        <span className="mono ink-2">cli: {step?.validator?.cli || validator.cli || "—"}</span>
        <span className="ink-3">·</span>
        <span className="mono ink-2">on_max_loops: {step?.validator?.on_max_loops || "—"}</span>
        {validator.final_verdict && (
          <span className={"badge " + verdictBadgeClass(validator.final_verdict)}>{validator.final_verdict}</span>
        )}
        {!validator.final_verdict && runStep?.status === "paused" && (
          <span className="badge badge-paused"><span className="dot dot-paused" /> awaiting decision</span>
        )}
      </div>
      {history.length === 0 ? (
        <div className="text-[12.5px] ink-3 italic">No completed loops yet.</div>
      ) : (
        <div className="flex flex-col gap-2">
          {history.map((h, i) => {
            const open = openIdx === i;
            return (
              <div key={i} className="border hairline rounded-md overflow-hidden">
                <button
                  onClick={() => setOpenIdx(open ? -1 : i)}
                  className="w-full flex items-center gap-3 px-3 py-2.5 text-left hover:bg-black/[0.015] transition-colors"
                >
                  <span className="mono text-[11px] ink-3 w-12 shrink-0">loop {h.loop.toString().padStart(2,"0")}</span>
                  <span className={"badge " + verdictBadgeClass(h.verdict)}>{h.verdict}</span>
                  <span className="text-[12px] ink-2 truncate flex-1">{h.feedback}</span>
                  <span className="mono text-[10.5px] ink-3 shrink-0">{open ? "−" : "+"}</span>
                </button>
                {open && (
                  <div className="border-t hairline">
                    <div className="px-3 py-2 flex items-center gap-3 text-[10.5px] mono ink-3 bg-black/[0.015]">
                      <span>stdout</span>
                      <span className="ml-auto">{h.finished_at ? "finished " + fmtAgo(h.finished_at) : "—"}</span>
                    </div>
                    <pre className="px-4 py-3 text-[12px] mono ink whitespace-pre-wrap leading-relaxed">{h.output}</pre>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

const StepDefinition = ({ step, idx, total, runStep }) => {
  const kindBadge = step.kind === "prompt" ? "prompt" : "shell";
  return (
    <div>
      <div className="flex items-center gap-3 mb-3">
        <span className="mono text-[11px] ink-3">{(idx+1).toString().padStart(2,"0")} / {total.toString().padStart(2,"0")}</span>
        <span className="mono text-[15px] ink font-semibold">{step.name}</span>
        <span className="badge">{step.cli}</span>
        <span className="badge">{kindBadge}</span>
        {step.validator && (
          <span className="badge badge-running">
            validator · {step.validator.cli} · max {step.validator.max_loops} · on_max: {step.validator.on_max_loops}
          </span>
        )}
      </div>

      {step.input && (
        <div className="mb-3 flex items-baseline gap-2">
          <span className="text-[11px] uppercase tracking-wider ink-3 font-semibold">input</span>
          <span className="mono text-[12.5px] ink">{step.input}</span>
        </div>
      )}

      <div className="text-[11px] uppercase tracking-wider ink-3 font-semibold mb-1.5">
        content
        <span className="ml-2 mono ink-3" style={{textTransform:"none",letterSpacing:0}}>
          {step.kind === "prompt" ? "— prompt template" : "— skill name"}
        </span>
      </div>
      <pre className="rounded-md border hairline px-3 py-2.5 mono text-[12px] ink whitespace-pre-wrap leading-[1.55] overflow-x-auto scroll-thin"
           style={{background: step.kind === "prompt" ? "#fbfbfa" : "#0e0e10", color: step.kind === "prompt" ? "var(--ink)" : "#d8d8db"}}>
{step.content && step.content.length > 0 ? step.content : <span className="ink-3">(empty — wizard didn't write this step yet)</span>}
      </pre>

      {step.validator && (
        <div className="mt-4">
          <div className="text-[11px] uppercase tracking-wider ink-3 font-semibold mb-1.5">
            validator (cross-review)
            <span className="ml-2 mono ink-3" style={{textTransform:"none",letterSpacing:0}}>
              — {step.validator.cli} · {step.validator.kind} · max_loops: {step.validator.max_loops} · on_max_loops: {step.validator.on_max_loops}
            </span>
          </div>
          <pre className="rounded-md border hairline px-3 py-2.5 mono text-[12px] ink whitespace-pre-wrap leading-[1.55] overflow-x-auto scroll-thin"
               style={{background:"#fbfbfa"}}>
{step.validator.content || <span className="ink-3">(no validator prompt)</span>}
          </pre>
        </div>
      )}

      {runStep && (
        <div className="mt-4 grid grid-cols-2 gap-x-6 gap-y-1.5 text-[12.5px]">
          <div className="flex justify-between"><span className="ink-3">status</span><span className="mono ink">{statusLabel[runStep.status]}</span></div>
          {runStep.exit_code != null && <div className="flex justify-between"><span className="ink-3">exit code</span><span className="mono ink">{runStep.exit_code}</span></div>}
          {runStep.duration_ms != null && <div className="flex justify-between"><span className="ink-3">duration</span><span className="mono ink">{fmtDuration(runStep.duration_ms)}</span></div>}
          {runStep.started_at && <div className="flex justify-between"><span className="ink-3">started</span><span className="mono ink-2">{fmtClock(runStep.started_at)}</span></div>}
          {runStep.finished_at && <div className="flex justify-between"><span className="ink-3">finished</span><span className="mono ink-2">{fmtClock(runStep.finished_at)}</span></div>}
          {runStep.validator && (
            <div className="col-span-2 mt-2 panel rounded-md p-3 border hairline">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-[10.5px] uppercase tracking-wider ink-3 font-semibold">validator state</span>
                <span className="mono text-[12px] ink">loop {runStep.validator.loops_run}/{runStep.validator.max_loops}</span>
                {runStep.validator.final_verdict
                  ? <span className={"badge " + (runStep.validator.final_verdict === "accepted" ? "badge-done" : "badge-failed")}>{runStep.validator.final_verdict}</span>
                  : <span className="badge badge-running"><span className="dot dot-running" /> needs_changes</span>}
              </div>
              {runStep.validator.last_feedback && (
                <div className="text-[12px] ink-2 italic">"{runStep.validator.last_feedback}"</div>
              )}
            </div>
          )}
          {runStep.error && (
            <div className="col-span-2 mt-2 rounded-md p-3 border" style={{borderColor:"color-mix(in oklch, var(--failed) 35%, var(--line))", background:"color-mix(in oklch, var(--failed) 6%, white)"}}>
              <div className="text-[10.5px] uppercase tracking-wider font-semibold mb-1" style={{color:"var(--failed)"}}>error</div>
              <div className="mono text-[12px] ink">{runStep.error}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const statusLabel = {
  ready: "ready", draft: "draft",
  running: "running", done: "done", failed: "failed",
  cancelled: "cancelled", interrupted: "interrupted",
  paused: "paused",
  pending: "pending",
};

const Badge = ({ kind, children }) => (
  <span className={"badge badge-" + kind}>{children}</span>
);

// ─────────────────────────────────────────────────────────────────────
// Top bar
// ─────────────────────────────────────────────────────────────────────

const TopBar = ({ pipelines, runs, globalConnState, onRetryGlobal }) => {
  const liveRuns = useMemo(() => {
    let n = 0;
    for (const slug in runs) for (const r of runs[slug]) if (r.status === "running") n++;
    return n;
  }, [runs]);

  return (
    <header className="h-11 px-4 flex items-center justify-between border-b hairline bg-panel" data-screen-label="00 chrome">
      <div className="flex items-center gap-3">
        <div className="flex items-center gap-2">
          <div className="w-5 h-5 rounded-sm" style={{background:"var(--ink)"}}>
            <div className="w-full h-full grid place-items-center mono text-[10px] font-bold text-white">c</div>
          </div>
          <span className="mono text-[13px] font-semibold ink tracking-tight">che dash</span>
        </div>
        <span className="mono text-[11px] ink-3">localhost:7878</span>
      </div>
      <div className="flex items-center gap-3">
        <span className="mono text-[11px] ink-3">
          {pipelines.length} pipelines · {liveRuns} live
        </span>
        {globalConnState === "live" && (
          <span className="badge badge-live">
            <span className="dot dot-done" /> live
          </span>
        )}
        {globalConnState === "reconnecting" && (
          <span className="badge badge-reconn">
            <span className="dot dot-paused" /> reconnecting…
          </span>
        )}
        {globalConnState === "disconnected" && (
          <span className="flex items-center gap-2">
            <span className="badge badge-disconn">
              <span className="dot dot-failed" /> disconnected
            </span>
            <button className="btn btn-ghost mono text-[10.5px] ink-3" onClick={onRetryGlobal}>retry</button>
          </span>
        )}
        {/* "hidden" state: no badge shown */}
      </div>
    </header>
  );
};

// ─────────────────────────────────────────────────────────────────────

    return (
      <button
        onClick={() => onSelect(p.slug)}
        data-screen-label={"rail · " + p.slug}
        className={"w-full text-left px-3 py-2 rounded-md border border-transparent " +

        <div className="mt-0.5 text-[11.5px] ink-3 truncate">

// ─────────────────────────────────────────────────────────────────────
// Run detail (live + frozen share the same view)
// ─────────────────────────────────────────────────────────────────────

const RunDetail = ({ pipeline, run, slug, runId, stream, onBack, onCancel, onResume, onSelectStep, selectedStepIdx, onRunUpdate }) => {
  const [paneView, setPaneView] = useState("output");
  const [stdoutText, setStdoutText] = useState(null); // null=not fetched, ""=empty, str=content
  const [stdoutLoading, setStdoutLoading] = useState(false);

  // SSE state: per-step live stdout lines (idx → string[]) and dedup sets.
  const [stdoutLines, setStdoutLines] = useState({}); // { [stepIdx]: string[] }
  const nextLineOrdinal = useRef({});                  // { [stepIdx]: int }
  const seenKeys = useRef(new Set());                  // dedup: "step:<i>:start", etc.
  const [sseStatus, setSseStatus] = useState("idle"); // idle | live | reconnecting | disconnected
  const disconnectTimerRef = useRef(null);
  const outputScrollRef = useRef(null);
  const [autoScrollEnabled, setAutoScrollEnabled] = useState(true);

  // run may be null while the detail fetch is in flight — guard defensively
  const steps = run?.steps || [];
  const selectedStep = steps[selectedStepIdx] || null;
  const selectedHasValidator = selectedStep?.validator || null;

  // if we switched to a step without validator while on validator tab, fall back
  useEffect(() => {
    if (paneView === "validator" && !selectedHasValidator) setPaneView("output");
  }, [selectedStepIdx, selectedHasValidator]);

  // reset stdout cache when step or run changes
  useEffect(() => {
    setStdoutText(null);
    setStdoutLoading(false);
  }, [selectedStepIdx, runId]);

  // ── SSE lifecycle ─────────────────────────────────────────────────────
  useEffect(() => {
    if (!slug || !runId || !run) return;
    const liveStatuses = ["running", "paused"];
    if (!liveStatuses.includes(run.status)) return;

    const url = '/api/pipelines/' + slug + '/runs/' + runId + '/events';
    const es = new EventSource(url);

    es.onopen = () => {
      setSseStatus("live");
      if (disconnectTimerRef.current) {
        clearTimeout(disconnectTimerRef.current);
        disconnectTimerRef.current = null;
      }
    };

    es.onerror = () => {
      if (es.readyState === EventSource.CONNECTING) {
        setSseStatus("reconnecting");
      } else {
        setSseStatus("disconnected");
      }
      // Start 10s timer to declare permanently disconnected.
      if (!disconnectTimerRef.current) {
        disconnectTimerRef.current = setTimeout(() => {
          setSseStatus("disconnected");
          disconnectTimerRef.current = null;
        }, 10000);
      }
    };

    es.addEventListener("run:status", (e) => {
      const data = JSON.parse(e.data);
      if (onRunUpdate) onRunUpdate({ type: "run:status", ...data });
      if (data.status && data.status !== "running" && data.status !== "paused") {
        // Terminal — close and refetch.
        es.close();
        setSseStatus("idle");
        if (onRunUpdate) onRunUpdate({ type: "refetch" });
      }
    });

    es.addEventListener("step:start", (e) => {
      const data = JSON.parse(e.data);
      const key = "step:" + data.idx + ":start";
      if (seenKeys.current.has(key)) return;
      seenKeys.current.add(key);
      if (onRunUpdate) onRunUpdate({ type: "step:start", ...data });
    });

    es.addEventListener("step:end", (e) => {
      const data = JSON.parse(e.data);
      const key = "step:" + data.idx + ":end";
      if (seenKeys.current.has(key)) return;
      seenKeys.current.add(key);
      if (onRunUpdate) onRunUpdate({ type: "step:end", ...data });
    });

    es.addEventListener("step:stdout", (e) => {
      const data = JSON.parse(e.data);
      const idx = data.idx;
      const expected = nextLineOrdinal.current[idx] || 0;
      if (data.ordinal < expected) return; // duplicate
      nextLineOrdinal.current[idx] = data.ordinal + 1;
      setStdoutLines(prev => ({
        ...prev,
        [idx]: [...(prev[idx] || []), data.line],
      }));
    });

    es.addEventListener("validator:loop", (e) => {
      const data = JSON.parse(e.data);
      const key = "validator:" + data.idx + ":" + data.loop;
      if (seenKeys.current.has(key)) return;
      seenKeys.current.add(key);
      if (onRunUpdate) onRunUpdate({ type: "validator:loop", ...data });
    });

    return () => {
      es.close();
      if (disconnectTimerRef.current) {
        clearTimeout(disconnectTimerRef.current);
        disconnectTimerRef.current = null;
      }
    };
  }, [slug, runId, run?.status]);

  // ── auto-scroll ───────────────────────────────────────────────────────
  useEffect(() => {
    if (!autoScrollEnabled) return;
    const el = outputScrollRef.current;
    if (!el) return;
    el.scrollTop = el.scrollHeight;
  }, [stdoutLines, autoScrollEnabled]);

  const handleOutputScroll = (e) => {
    const el = e.target;
    const distFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
    setAutoScrollEnabled(distFromBottom <= 50);
  };

  // lazy fetch stdout when tab is "output" and not yet loaded (frozen runs)
  useEffect(() => {
    if (paneView !== "output") return;
    if (stdoutText !== null) return; // already fetched or loading
    if (!slug || !runId || selectedStep == null) return;
    if (selectedStep.status === "pending") return;
    // If we have live SSE lines for this step, don't fetch from disk.
    if (stdoutLines[selectedStepIdx] && stdoutLines[selectedStepIdx].length > 0) return;
    // Only fetch if run is not live (frozen).
    if (run?.status === "running" || run?.status === "paused") return;

    setStdoutLoading(true);
    const ctrl = new AbortController();
    fetch('/api/pipelines/' + slug + '/runs/' + runId + '/steps/' + selectedStepIdx + '/stdout', { signal: ctrl.signal })
      .then(r => {
        if (r.status === 404) return '';
        return r.text();
      })
      .then(text => {
        setStdoutText(text || '');
        setStdoutLoading(false);
      })
      .catch(err => {
        if (err.name !== 'AbortError') {
          console.error('[dash] fetch stdout:', err);
          setStdoutText('');
          setStdoutLoading(false);
        }
      });
    return () => ctrl.abort();
  }, [paneView, selectedStepIdx, runId, slug, stdoutText, run?.status]);

  if (!run) {
    return (
      <div className="flex flex-col h-full items-center justify-center">
        <div className="ink-3 text-[13px] mono">cargando run…</div>
      </div>
    );
  }

  const isLive = run.status === "running";
  const dur = run.finished_at && run.started_at
    ? new Date(run.finished_at).getTime() - new Date(run.started_at).getTime()
    : run.started_at ? Date.now() - new Date(run.started_at).getTime() : null;

  // step duration from manifest: finished_at - started_at in ms
  const stepDuration = (s) => {
    if (!s || !s.finished_at || !s.started_at) return null;
    return new Date(s.finished_at).getTime() - new Date(s.started_at).getTime();
  };

  return (
    <div className="flex flex-col h-full" data-screen-label={"run · " + run.id}>
      {/* run header */}
      <div className="px-8 pt-6 pb-4 border-b hairline">
        <div className="flex items-center gap-3 mb-1">
          <button className="btn btn-ghost ink-3 px-1" onClick={onBack} title="back to pipeline">←</button>
          <span className="mono text-[12px] ink-3">{pipeline.name} /</span>
          <span className="mono text-[15px] font-semibold ink">{run.id}</span>
          <StatusDot status={run.status} />
          <span className="mono text-[12px] ink-2">{statusLabel[run.status]}</span>
          <div className="ml-auto flex items-center gap-2">
            {run.status === "paused" && (
              <>
                <button
                  className="btn btn-primary disabled:opacity-50 disabled:cursor-not-allowed"
                  disabled
                  title="v1 read-only — usar TUI para lanzar"
                >Resume run</button>
                <button
                  className="btn btn-danger disabled:opacity-50 disabled:cursor-not-allowed"
                  disabled
                  title="v1 read-only — usar TUI para lanzar"
                >Cancel</button>
              </>
            )}
            {isLive && (
              <button
                className="btn btn-danger disabled:opacity-50 disabled:cursor-not-allowed"
                disabled
                title="v1 read-only — usar TUI para lanzar"
              >Cancel run</button>
            )}
          </div>
        </div>
        <div className="flex items-center gap-5 mono text-[12px] ink-3 ml-8">
          <span>started <span className="ink-2">{fmtClock(run.started_at)}</span> · {fmtAgo(run.started_at)}</span>
          <span>{isLive ? "live" : "duration"} <span className="ink-2">{fmtDuration(dur)}</span></span>
          {run.input_value && <span>input <span className="ink-2">{run.input_value}</span></span>}
          <span className="ml-auto">{steps.filter(s=>s.status==="done").length}/{steps.length} steps</span>
        </div>
      </div>

      {/* steps + detail pane */}
      <div className="flex flex-1 min-h-0">
        {/* steps timeline */}
        <div className="w-[380px] shrink-0 border-r hairline overflow-y-auto scroll-thin">
          <div className="px-4 pt-4 pb-2 text-[11px] uppercase tracking-wider ink-3 font-semibold">steps</div>
          <div className="pb-4">
            {steps.map((s, i) => {
              const sel = i === selectedStepIdx;
              const dur_ms = stepDuration(s);
              return (
                <button
                  key={s.name + i}
                  onClick={() => onSelectStep(i)}
                  className={"step-row w-full text-left px-4 py-3 border-b hairline-2 " + (sel ? "selected" : "")}
                >
                  <div className="flex items-center gap-2">
                    <span className="mono text-[10.5px] ink-3 w-5">{(i+1).toString().padStart(2,"0")}</span>
                    <StatusDot status={s.status} />
                    <span className="mono text-[13px] ink">{s.name}</span>
                    <span className="mono text-[10.5px] ink-3 ml-1">{s.cli}</span>
                    <span className="ml-auto mono text-[11px] ink-3">
                      {s.status === "running" ? "running" : fmtDuration(dur_ms)}
                    </span>
                  </div>
                  {s.error && (
                    <div className="mt-1.5 ml-7 text-[11.5px]" style={{color:"var(--failed)"}}>
                      {s.error}
                    </div>
                  )}
                  {s.validator && (
                    <div className="mt-2 ml-7 panel rounded-md p-2 border hairline" style={{background:"rgba(0,0,0,0.015)"}}>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-[10.5px] uppercase tracking-wider ink-3 font-semibold">validator</span>
                        <span className="mono text-[11px] ink-2">
                          loop {s.validator.loops_run}/{s.validator.max_loops}
                        </span>
                        {s.validator.final_verdict && (
                          <span className={"badge " + (s.validator.final_verdict === "accepted" ? "badge-done" : "badge-failed")}>
                            {s.validator.final_verdict}
                          </span>
                        )}
                        {!s.validator.final_verdict && s.status === "running" && (
                          <span className="badge badge-running"><span className="dot dot-running" /> needs_changes</span>
                        )}
                      </div>
                      {s.validator.last_feedback && (
                        <div className="text-[11.5px] ink-2 italic">"{s.validator.last_feedback}"</div>
                      )}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* detail pane */}
        <div className="flex-1 flex flex-col min-w-0">
          <div className="flex items-center justify-between px-4 py-0 border-b hairline">
            <div className="flex items-center gap-0">
              {/* output tab: disabled if step is pending */}
              <button
                onClick={() => selectedStep?.status !== "pending" && setPaneView("output")}
                disabled={selectedStep?.status === "pending"}
                className={"px-3 py-3 text-[12px] mono border-b-2 transition-colors " + (paneView === "output" ? "ink font-semibold" : "ink-3 hover:ink-2") + (selectedStep?.status === "pending" ? " opacity-40 cursor-not-allowed" : "")}
                style={{borderColor: paneView === "output" ? "var(--ink)" : "transparent", marginBottom: "-1px"}}
              >
                output
              </button>
              {/* definition tab: always available */}
              <button
                onClick={() => setPaneView("definition")}
                className={"px-3 py-3 text-[12px] mono border-b-2 transition-colors " + (paneView === "definition" ? "ink font-semibold" : "ink-3 hover:ink-2")}
                style={{borderColor: paneView === "definition" ? "var(--ink)" : "transparent", marginBottom: "-1px"}}
              >
                definition
              </button>
              {/* validator tab: only if step has validator, disabled if pending */}
              {selectedHasValidator && (
                <button
                  onClick={() => selectedStep?.status !== "pending" && setPaneView("validator")}
                  disabled={selectedStep?.status === "pending"}
                  className={"px-3 py-3 text-[12px] mono border-b-2 transition-colors " + (paneView === "validator" ? "ink font-semibold" : "ink-3 hover:ink-2") + (selectedStep?.status === "pending" ? " opacity-40 cursor-not-allowed" : "")}
                  style={{borderColor: paneView === "validator" ? "var(--ink)" : "transparent", marginBottom: "-1px"}}
                >
                  validator <span className="ink-3">{selectedHasValidator.loops_run}/{selectedHasValidator.max_loops}</span>
                </button>
              )}
              <span className="ml-3 mono text-[11.5px] ink-2">
                {selectedStep?.name}
              </span>
              {selectedStep?.status === "running" && paneView === "output" && (
                <span className="badge badge-running ml-2"><span className="dot dot-running" /> live</span>
              )}
            </div>
            <div className="flex items-center gap-2 mono text-[10.5px] ink-3">
              {/* SSE connection badge */}
              {sseStatus === "live" && (
                <span className="badge badge-running"><span className="dot dot-running" /> live</span>
              )}
              {sseStatus === "reconnecting" && (
                <span className="badge badge-paused"><span className="dot dot-paused" /> reconnecting…</span>
              )}
              {sseStatus === "disconnected" && (
                <span className="badge badge-failed"><span className="dot dot-failed" /> disconnected</span>
              )}
              {paneView === "definition"
                ? <span>step {(selectedStepIdx+1).toString().padStart(2,"00")} / {steps.length.toString().padStart(2,"00")}</span>
                : paneView === "validator"
                ? <span>{selectedHasValidator?.loops_run || 0} loop{(selectedHasValidator?.loops_run || 0) === 1 ? "" : "s"}</span>
                : null}
            </div>
          </div>

          {paneView === "output" ? (() => {
            // Determine output source: SSE lines (live) or fetched text (frozen).
            const liveLines = stdoutLines[selectedStepIdx];
            const hasLiveLines = liveLines && liveLines.length > 0;
            const isLiveRun = run?.status === "running" || run?.status === "paused";
            return (
              <div
                ref={outputScrollRef}
                onScroll={handleOutputScroll}
                className="stream flex-1 overflow-y-auto scroll-thin px-4 py-3"
              >
                {selectedStep?.status === "pending" ? (
                  <div className="ink-3 text-[12.5px]">step pendiente — aún no corrió</div>
                ) : hasLiveLines ? (
                  <>
                    {selectedStep?.error && (
                      <div className="mb-3 px-3 py-2 rounded text-[12px] mono" style={{background:"rgba(220,38,38,0.08)",color:"var(--failed)"}}>
                        {selectedStep.error}
                      </div>
                    )}
                    <pre className="mono text-[12px] ink whitespace-pre-wrap">{liveLines.join("\n")}</pre>
                    {isLiveRun && selectedStep?.status === "running" && (
                      <span className="caret" />
                    )}
                  </>
                ) : isLiveRun && selectedStep?.status === "running" ? (
                  <div className="ink-3 text-[12.5px]">esperando stdout… <span className="caret" /></div>
                ) : stdoutLoading ? (
                  <div className="ink-3 text-[12.5px]">cargando…</div>
                ) : stdoutText === null ? null : stdoutText === '' ? (
                  <div className="ink-3 text-[12.5px]">sin stdout registrado</div>
                ) : (
                  <>
                    {selectedStep?.error && (
                      <div className="mb-3 px-3 py-2 rounded text-[12px] mono" style={{background:"rgba(220,38,38,0.08)",color:"var(--failed)"}}>
                        {selectedStep.error}
                      </div>
                    )}
                    <pre className="mono text-[12px] ink whitespace-pre-wrap">{stdoutText}</pre>
                  </>
                )}
              </div>
            );
          })() : paneView === "definition" ? (
            <div className="flex-1 overflow-y-auto scroll-thin px-6 py-5">
              {selectedStep ? (
                <div>
                  <div className="flex items-center gap-2 mb-4">
                    <span className="mono text-[13px] font-semibold ink">{selectedStep.name}</span>
                    {selectedStep.cli && <span className="badge mono">{selectedStep.cli}</span>}
                    {selectedStep.kind && <span className="badge mono">{selectedStep.kind}</span>}
                  </div>
                  {selectedStep.content ? (
                    <pre className="mono text-[12px] ink-2 whitespace-pre-wrap bg-[var(--bg)] rounded border hairline px-4 py-3">{selectedStep.content}</pre>
                  ) : (
                    <div className="ink-3 text-[12.5px]">definición no persistida — ver YAML del pipeline</div>
                  )}
                </div>
              ) : (
                <div className="ink-3 text-[12.5px]">seleccioná un step</div>
              )}
            </div>
          ) : (
            /* validator tab */
            <div className="flex-1 overflow-y-auto scroll-thin px-6 py-5">
              {selectedHasValidator ? (
                <div>
                  <div className="flex items-center gap-3 mb-4">
                    <span className="mono text-[12px] ink-3">loops_run</span>
                    <span className="mono text-[13px] ink">{selectedHasValidator.loops_run} / {selectedHasValidator.max_loops}</span>
                    {selectedHasValidator.final_verdict && (
                      <span className={"badge " + verdictBadgeClass(selectedHasValidator.final_verdict)}>{selectedHasValidator.final_verdict}</span>

    </div>

const App = () => {
  const [pipelines, setPipelines] = useState(PIPELINES_INIT);
  const [runs, setRuns] = useState(RUNS_INIT);
  const [selectedSlug, setSelectedSlug] = useState(null);
  const [openRunId, setOpenRunId] = useState(null);
  const [runDetail, setRunDetail] = useState(null);
  const [selectedStepIdx, setSelectedStepIdx] = useState(0);
  const [modalOpen, setModalOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [notesOpen, setNotesOpen] = useState(false);

  const [streamLines, setStreamLines] = useState([]);

  // Global SSE state
  const [globalConnState, setGlobalConnState] = useState("hidden"); // hidden|live|reconnecting|disconnected
  const globalEsRef = useRef(null);
  const globalDisconnTimerRef = useRef(null);
  const globalHadErrorRef = useRef(false);
  const finishedRunsDedup = useRef(new Set()); // set of "runId:status"
  const fadedSlugsRef = useRef(new Set()); // slugs with fade-in animation pending
  const [fadedSlugs, setFadedSlugs] = useState(new Set());

  function secsToClock(secsBefore) {
    const d = new Date(NOW - secsBefore * 1000);
    return d.toTimeString().slice(0, 8);
  }

  // Keep ref to selectedSlug for use inside SSE callbacks.
  const selectedSlugRef = useRef(selectedSlug);
  useEffect(() => { selectedSlugRef.current = selectedSlug; }, [selectedSlug]);

  // ── fetch pipeline list on mount ──────────────────────────────────
  useEffect(() => {
    fetch('/api/pipelines')
      .then(r => r.json())
      .then(data => {
        setPipelines(data);
        // Select first ready pipeline alphabetically, or none if only drafts
        const ready = data.filter(p => p.status === 'ready');
        if (ready.length > 0) {
          setSelectedSlug(ready[0].slug);
        }
      })
      .catch(err => console.error('[dash] fetch pipelines:', err));
  }, []);

  // ── fetch pipeline detail when selection changes ──────────────────
  useEffect(() => {
    if (!selectedSlug) return;
    fetch('/api/pipelines/' + selectedSlug)
      .then(r => r.json())
      .then(detail => {
        setPipelines(prev => prev.map(p =>
          p.slug === detail.slug ? { ...p, steps: detail.steps } : p
        ));
      })
      .catch(err => console.error('[dash] fetch pipeline detail:', err));
  }, [selectedSlug]);

  // ── fetch runs list when selected slug changes ────────────────────
  useEffect(() => {
    if (!selectedSlug) return;
    const ctrl = new AbortController();
    fetch('/api/pipelines/' + selectedSlug + '/runs', { signal: ctrl.signal })
      .then(r => r.json())
      .then(data => {
        setRuns(prev => ({ ...prev, [selectedSlug]: data }));
      })
      .catch(err => { if (err.name !== 'AbortError') console.error('[dash] fetch runs:', err); });
    return () => ctrl.abort();
  }, [selectedSlug]);

  // ── global EventSource ────────────────────────────────────────────
  const openGlobalES = useCallback(() => {
    if (globalEsRef.current) {
      globalEsRef.current.close();
    }
    const es = new EventSource('/api/events');
    globalEsRef.current = es;
    globalHadErrorRef.current = false;

    es.onopen = () => {
      setGlobalConnState("live");
      if (globalDisconnTimerRef.current) {
        clearTimeout(globalDisconnTimerRef.current);
        globalDisconnTimerRef.current = null;
      }
      // If we had an error before (reconnect), refetch pipeline list and runs.
      if (globalHadErrorRef.current) {
        globalHadErrorRef.current = false;
        fetch('/api/pipelines')
          .then(r => r.json())
          .then(data => setPipelines(data))
          .catch(err => console.error('[dash] refetch pipelines:', err));
        const slug = selectedSlugRef.current;
        if (slug) {
          fetch('/api/pipelines/' + slug + '/runs')
            .then(r => r.json())
            .then(data => setRuns(prev => ({ ...prev, [slug]: data })))
            .catch(err => console.error('[dash] refetch runs:', err));
        }
      }
    };

    es.onerror = () => {
      globalHadErrorRef.current = true;
      if (es.readyState === EventSource.CONNECTING) {
        setGlobalConnState("reconnecting");
      } else {
        setGlobalConnState("disconnected");
      }
      if (!globalDisconnTimerRef.current) {
        globalDisconnTimerRef.current = setTimeout(() => {
          setGlobalConnState("disconnected");
          globalDisconnTimerRef.current = null;
        }, 10000);
      }
    };

    es.addEventListener("pipeline:changed", (e) => {
      const data = JSON.parse(e.data);
      const { slug, status, deleted } = data;
      if (!slug) return;

      if (deleted) {
        // Remove from pipelines list.
        setPipelines(prev => prev.filter(p => p.slug !== slug));
        // If selected pipeline was deleted, clear selection.
        if (selectedSlugRef.current === slug) {
          setSelectedSlug("__deleted__");
        }
        return;
      }

      setPipelines(prev => {
        const existing = prev.find(p => p.slug === slug);
        if (!existing) {
          // New pipeline — insert and trigger fade-in.
          const newPipeline = { slug, name: slug, status: status || "ready" };
          fadedSlugsRef.current = new Set([...fadedSlugsRef.current, slug]);
          setFadedSlugs(new Set(fadedSlugsRef.current));
          // Remove fade class after animation completes.
          setTimeout(() => {
            fadedSlugsRef.current.delete(slug);
            setFadedSlugs(new Set(fadedSlugsRef.current));
          }, 600);
          return [...prev, newPipeline];
        }
        // Status flip — update existing.
        return prev.map(p => p.slug === slug ? { ...p, status: status || p.status } : p);
      });
    });

    es.addEventListener("run:started", (e) => {
      const data = JSON.parse(e.data);
      const { slug, run_id, started_at } = data;
      if (!slug || !run_id) return;

      // Update pipeline last_run optimistically.
      setPipelines(prev => prev.map(p =>
        p.slug === slug
          ? { ...p, last_run: { id: run_id, status: "running", started_at } }
          : p
      ));

      // If this slug is selected, insert new run at top with fade-in.
      if (selectedSlugRef.current === slug) {
        const newRun = { id: run_id, status: "running", started_at };
        setRuns(prev => {
          const existing = (prev[slug] || []).find(r => r.id === run_id);
          if (existing) return prev; // already present
          return { ...prev, [slug]: [newRun, ...(prev[slug] || [])] };
        });
        // Trigger fade-in for the run row.
        fadedSlugsRef.current = new Set([...fadedSlugsRef.current, "run:" + run_id]);
        setFadedSlugs(new Set(fadedSlugsRef.current));
        setTimeout(() => {
          fadedSlugsRef.current.delete("run:" + run_id);
          setFadedSlugs(new Set(fadedSlugsRef.current));
        }, 600);
      }
    });

    es.addEventListener("run:finished", (e) => {
      const data = JSON.parse(e.data);
      const { slug, run_id, status, started_at, finished_at } = data;
      if (!slug || !run_id || !status) return;

      // Dedup: if we already processed this (run_id, terminal_status) pair, skip.
      const dedupKey = run_id + ":" + status;
      if (finishedRunsDedup.current.has(dedupKey)) return;
      finishedRunsDedup.current.add(dedupKey);

      // Update pipeline last_run.
      setPipelines(prev => prev.map(p => {
        if (p.slug !== slug) return p;
        const lr = p.last_run;
        // Only update if this run is the most recent.
        if (!lr || lr.id === run_id || !lr.started_at || (started_at && started_at >= lr.started_at)) {
          return { ...p, last_run: { id: run_id, status, started_at: started_at || (lr && lr.started_at) || "" } };
        }
        return p;
      }));

      // Update run in table if selected slug.
      if (selectedSlugRef.current === slug) {
        setRuns(prev => ({
          ...prev,
          [slug]: (prev[slug] || []).map(r =>
            r.id === run_id ? { ...r, status, finished_at: finished_at || r.finished_at } : r
          ),
        }));
        // If viewing this run detail, update it too.
        setRunDetail(prev => {
          if (!prev || prev.id !== run_id) return prev;
          return { ...prev, status, finished_at: finished_at || prev.finished_at };
        });
      }
    });

    return es;
  }, []);

  // Mount: open global EventSource. Cleanup on unmount.
  useEffect(() => {
    const es = openGlobalES();
    return () => {
      es.close();
      if (globalDisconnTimerRef.current) {
        clearTimeout(globalDisconnTimerRef.current);
      }
    };
  }, [openGlobalES]);

  const retryGlobal = useCallback(() => {
    setGlobalConnState("reconnecting");
    openGlobalES();
  }, [openGlobalES]);

  // ── fetch run detail when openRunId changes ───────────────────────
  useEffect(() => {
    if (!openRunId || !selectedSlug) {
      setRunDetail(null);
      return;
    }
    const ctrl = new AbortController();
    fetch('/api/pipelines/' + selectedSlug + '/runs/' + openRunId, { signal: ctrl.signal })
      .then(r => r.json())
      .then(data => setRunDetail(data))
      .catch(err => { if (err.name !== 'AbortError') console.error('[dash] fetch run detail:', err); });
    return () => ctrl.abort();
  }, [openRunId, selectedSlug]);

  const selectedPipeline = pipelines.find(p => p.slug === selectedSlug);
  const openRun = openRunId
    ? (runs[selectedSlug] || []).find(r => r.id === openRunId)
    : null;

  // ── live stream simulator ─────────────────────────────────────────
  const streamIdxRef = useRef(0);
  useEffect(() => {
    if (!openRun || openRun.status !== "running") return;
    const id = setInterval(() => {
      if (streamIdxRef.current >= STREAM_CONTINUATIONS.length) {
        clearInterval(id);
        // mark the run as done
        setRuns(prev => {
          const slug = "refactor-go";
          return {
            ...prev,
            [slug]: prev[slug].map(r => {
              if (r.id !== "7c2a91") return r;
              const steps = r.steps.map(s => ({ ...s,
                status: s.status === "pending" || s.status === "running" ? "done" : s.status,
                exit_code: 0,
                duration_ms: s.duration_ms ?? Math.floor(2000 + Math.random()*8000),
              }));
              if (steps[2] && steps[2].validator) {
                steps[2].validator = { ...steps[2].validator, loops_run: 3, final_verdict: "accepted", last_feedback: null };
              }
              return { ...r, status: "done", finished_at: new Date().toISOString(), steps };
            }),
          };
        });
        return;
      }
      const next = STREAM_CONTINUATIONS[streamIdxRef.current++];
      const now = new Date();
      const tStr = now.toTimeString().slice(0,8);
      setStreamLines(prev => [...prev, { ...next, tStr }]);

      // mid-stream side-effects to update step state
      if (next.text.startsWith("validator: loop 3 verdict = accepted")) {
        setRuns(prev => ({
          ...prev,
          "refactor-go": prev["refactor-go"].map(r => {
            if (r.id !== "7c2a91") return r;
            const steps = [...r.steps];
            steps[2] = { ...steps[2], status: "done", exit_code: 0, duration_ms: 60000,
              validator: { ...steps[2].validator, loops_run: 3, final_verdict: "accepted", last_feedback: null } };
            steps[3] = { ...steps[3], status: "running", started_at: new Date().toISOString() };
            return { ...r, steps };
          })
        }));
        setSelectedStepIdx(3);
      }
      if (next.text.startsWith("ok  internal/runner/stream")) {
        setRuns(prev => ({
          ...prev,
          "refactor-go": prev["refactor-go"].map(r => {
            if (r.id !== "7c2a91") return r;
            const steps = [...r.steps];
            steps[3] = { ...steps[3], status: "done", exit_code: 0, duration_ms: 17000 };
            steps[4] = { ...steps[4], status: "running", started_at: new Date().toISOString() };
            return { ...r, steps };
          })
        }));
        setSelectedStepIdx(4);
      }
    }, 1100);
    return () => clearInterval(id);
  }, [openRun?.id, openRun?.status]);

  // ── keyboard ──────────────────────────────────────────────────────
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") {
        if (modalOpen) setModalOpen(false);
        else if (notesOpen) setNotesOpen(false);
        else if (openRunId) setOpenRunId(null);
      }
      if (e.key.toLowerCase() === "r" && !modalOpen && !openRunId) {
        if (selectedPipeline && selectedPipeline.status === "ready") setModalOpen(true);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [modalOpen, notesOpen, openRunId, selectedPipeline]);

  // ── handlers ──────────────────────────────────────────────────────
  const requestRun = () => setModalOpen(true);

  const confirmRun = (input) => {
    setModalOpen(false);
    // create a fake new run
    const newId = Math.random().toString(16).slice(2, 8);
    setRuns(prev => {
      const list = prev[selectedSlug] || [];
      const fresh = {
        id: newId,
        status: "running",
        started_at: new Date().toISOString(),
        finished_at: null,
        input: input || null,
        steps: (selectedPipeline.steps || []).map((s, i) => ({
          name: s.name,
          status: i === 0 ? "running" : "pending",
          started_at: i === 0 ? new Date().toISOString() : null,
        })),
      };
      return { ...prev, [selectedSlug]: [fresh, ...list].slice(0, 10) };
    });
    setToast({ message: "Run started · " + newId, remaining: 0, kind: "started" });
    setTimeout(() => setToast(null), 2200);
  };

  const cancelRun = () => {
    if (!openRun) return;
    const id = openRun.id;
    // optimistic cancel
    setRuns(prev => ({
      ...prev,
      [selectedSlug]: prev[selectedSlug].map(r =>
        r.id === id ? { ...r, status: "cancelled", finished_at: new Date().toISOString() } : r)
    }));
    // start undo countdown
    let remaining = 3;
    setToast({ message: "Run cancelled · " + id, remaining, kind: "cancelled", undoId: id });
    const tick = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(tick);
        setToast(null);
      } else {
        setToast(t => t && t.undoId === id ? { ...t, remaining } : t);
      }
    }, 1000);
  };

  const undoCancel = () => {
    if (!toast?.undoId) return;
    const id = toast.undoId;
    setRuns(prev => ({
      ...prev,
      [selectedSlug]: prev[selectedSlug].map(r =>
        r.id === id ? { ...r, status: "running", finished_at: null } : r)
    }));
    setToast(null);
  };

  const resumeRun = () => {
    if (!openRun) return;
    setRuns(prev => ({
      ...prev,
      [selectedSlug]: prev[selectedSlug].map(r => {
        if (r.id !== openRun.id) return r;
        const steps = r.steps.map(s => s.status === "paused" ? { ...s, status: "running" } : s);
        return { ...r, status: "running", steps };
      })
    }));
    setToast({ message: "Run resumed · " + openRun.id });
    setTimeout(() => setToast(null), 1800);
  };

  // ── SSE run update handler ────────────────────────────────────────────
  // Called by RunDetail when SSE events arrive. Updates runDetail and runs
  // state so steps column and badges refresh in real time.
  const handleRunUpdate = useCallback((msg) => {
    if (!selectedSlug || !openRunId) return;

    if (msg.type === "refetch") {
      // Re-fetch run detail after terminal status.
      fetch('/api/pipelines/' + selectedSlug + '/runs/' + openRunId)
        .then(r => r.json())
        .then(data => {
          setRunDetail(data);
          setRuns(prev => ({
            ...prev,
            [selectedSlug]: (prev[selectedSlug] || []).map(r =>
              r.id === openRunId ? { ...r, status: data.status, finished_at: data.finished_at } : r
            ),
          }));
        })
        .catch(err => console.error('[dash] refetch run detail:', err));
      return;
    }

    if (msg.type === "run:status") {
      setRunDetail(prev => prev ? { ...prev, status: msg.status } : prev);
      setRuns(prev => ({
        ...prev,
        [selectedSlug]: (prev[selectedSlug] || []).map(r =>
          r.id === openRunId ? { ...r, status: msg.status } : r
        ),
      }));
      return;
    }

    if (msg.type === "step:start") {
      setRunDetail(prev => {
        if (!prev) return prev;
        const steps = prev.steps.map(s =>
          s.idx === msg.idx ? { ...s, status: "running", started_at: msg.started_at } : s
        );
        return { ...prev, steps };
      });
      return;
    }

    if (msg.type === "step:end") {
      setRunDetail(prev => {
        if (!prev) return prev;
        const steps = prev.steps.map(s =>
          s.idx === msg.idx
            ? { ...s, status: msg.status, exit_code: msg.exit_code, finished_at: msg.finished_at, error: msg.error || s.error }
            : s
        );
        return { ...prev, steps };
      });
      return;
    }

    if (msg.type === "validator:loop") {
      setRunDetail(prev => {
        if (!prev) return prev;
        const steps = prev.steps.map(s => {
          if (s.idx !== msg.idx) return s;
          const v = s.validator || { loops_run: 0, max_loops: msg.max_loops };
          return {
            ...s,
            validator: {
              ...v,
              loops_run: msg.loop,
              max_loops: msg.max_loops,
              final_verdict: msg.verdict || v.final_verdict,
              last_feedback: msg.feedback || v.last_feedback,
            },
          };
        });
        return { ...prev, steps };
      });
      return;
    }
  }, [selectedSlug, openRunId]);

  const onSelectPipeline = (slug) => {
    setSelectedSlug(slug);
    setOpenRunId(null);
    setRunDetail(null);
  };

  return (
    <div className="h-screen flex flex-col">
      <TopBar pipelines={pipelines} runs={runs} globalConnState={globalConnState} onRetryGlobal={retryGlobal} />
      <div className="flex flex-1 min-h-0">
        <Sidebar
          pipelines={pipelines}
          runs={runs}
          selectedSlug={selectedSlug === "__deleted__" ? null : selectedSlug}
          onSelect={onSelectPipeline}
          fadedSlugs={fadedSlugs}
        />
        <main className="flex-1 min-w-0 overflow-y-auto scroll-thin">
          {selectedSlug === "__deleted__" ? (
            <PipelineDeletedState />
          ) : !selectedPipeline ? (
            <div className="p-8 ink-3 text-[13px]">
              {pipelines.length === 0
                ? "no pipelines yet — corré che y entrá a Create pipeline"
                : "seleccioná un pipeline del rail"}
            </div>
          ) : openRunId ? (
            <RunDetail
              pipeline={selectedPipeline}
              run={runDetail || openRun}
              slug={selectedSlug}
              runId={openRunId}
              stream={streamLines}
              selectedStepIdx={selectedStepIdx}
              onSelectStep={setSelectedStepIdx}
              onBack={() => { setOpenRunId(null); setRunDetail(null); }}
              onCancel={cancelRun}
              onResume={resumeRun}
              onRunUpdate={handleRunUpdate}
            />
          ) : (
            <PipelineDetail
              pipeline={selectedPipeline}
              runs={runs}
              onOpenRun={(id) => { setOpenRunId(id); setSelectedStepIdx(0); setRunDetail(null); }}
              onRequestRun={requestRun}
              onResumeDraft={() => alert("Prototype: would run `che new --resume " + selectedPipeline.slug + "` in the user's terminal.")}
              fadedRunIds={fadedSlugs}
            />
          )}
        </main>
      </div>

      {/* Notes affordance */}
      <button
        className="fixed bottom-5 right-5 z-20 btn"
        onClick={() => setNotesOpen(true)}
        title="Designer notes"
      >
        notes · routes · SSE
      </button>

      <NotesDrawer open={notesOpen} onClose={() => setNotesOpen(false)} />

      {modalOpen && selectedPipeline && (
        <RunModal
          pipeline={selectedPipeline}
          onClose={() => setModalOpen(false)}
          onConfirm={confirmRun}
        />
      )}

      <UndoToast toast={toast} onUndo={toast?.undoId ? undoCancel : () => setToast(null)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
